<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Enrique Ruiz | Automatizaciones & Diseño Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; overflow-x: hidden; }
        .hero-overlay { background: radial-gradient(circle at center, transparent 10%, #0a0a0a 100%); }
        .text-shadow-glow { text-shadow: 0 0 30px rgba(6, 182, 212, 0.6); }
        .tech-tag { background: rgba(6, 182, 212, 0.1); color: #22d3ee; padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; }
        
        #v0 { 
            will-change: transform; 
            filter: brightness(0.6);
            object-fit: cover;
            transform: translateZ(0); /* Acelera por hardware */
        }
    </style>
</head>

<body class="text-gray-100 selection:bg-cyan-500 selection:text-white">

<header class="fixed top-0 w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex flex-col">
            <span class="text-xl font-black tracking-tighter uppercase italic">Enrique<span class="text-cyan-500">Ruiz</span></span>
            <span class="text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold">Smart Automations</span>
        </div>
        <nav class="hidden md:flex items-center space-x-8">
            <a class="text-xs uppercase tracking-widest font-bold hover:text-cyan-400 transition-colors" href="#home">Home</a>
            <a class="text-xs uppercase tracking-widest font-bold hover:text-cyan-400 transition-colors" href="#portfolio">Proyectos</a>
            <a class="text-xs uppercase tracking-widest font-bold hover:text-cyan-400 transition-colors" href="#servicios">Servicios</a>
            <a class="text-xs uppercase tracking-widest font-bold hover:text-cyan-400 transition-colors" href="#contacto">Hablemos</a>
        </nav>
    </div>
</header>

<main>
    <section id="home" class="relative h-[400vh] bg-black">
        <div class="sticky top-0 left-0 w-full h-screen overflow-hidden">
            <video 
                id="v0" 
                preload="auto" 
                class="w-full h-full object-cover"
                muted
                playsinline
            >
                <source type="video/mp4" src="assets/videos/hero-scroll.mp4">
            </video>
            
            <div class="absolute inset-0 flex items-center justify-center hero-overlay">
                <div id="hero-text" class="relative z-10 max-w-5xl mx-auto px-6 text-center">
                    <span class="inline-block px-4 py-1 rounded-full border border-cyan-500/30 text-cyan-400 text-xs font-bold uppercase tracking-widest mb-6 bg-cyan-500/5">Proyectos Abiertos 2026</span>
                    <h1 class="text-6xl md:text-8xl font-black leading-[0.9] mb-8 tracking-tighter text-white">
                        Diseño webs que <br>
                        <span class="bg-gradient-to-r from-cyan-400 via-emerald-400 to-blue-500 bg-clip-text text-transparent">trabajan por ti.</span>
                    </h1>
                    <p class="text-lg md:text-xl text-gray-400 mb-12 max-w-2xl mx-auto leading-relaxed font-light">
                        Automatizaciones inteligentes con <span class="text-white font-bold">n8n</span> para escalar tu negocio.
                    </p>
                    <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
                        <a class="px-10 py-5 bg-white text-black font-black rounded-full hover:bg-cyan-400 transition-all text-center uppercase tracking-tighter" href="#contacto">Empezar Proyecto</a>
                        <a class="text-sm font-bold border-b-2 border-cyan-500 pb-1 hover:text-cyan-400 transition-all uppercase tracking-widest text-white" href="#portfolio">Ver Portfolio</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="portfolio" class="py-24 bg-[#0a0a0a] relative z-20">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-16">
                <h2 class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-white">Soluciones <span class="text-cyan-500 text-shadow-glow">Desplegadas</span></h2>
                <p class="text-gray-400 mt-4 font-light">Proyectos reales gestionados dinámicamente desde n8n.</p>
            </div>
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </section>

    </main>

<script>
// 1. CARGA DE PROYECTOS (Mantenemos tu lógica que funciona)
async function cargarProyectos() {
    try {
        const res = await fetch('proyectos.json?v=' + Date.now());
        const datos = await res.json();
        const contenedor = document.getElementById('projects-container');
        contenedor.innerHTML = '';
        datos.forEach(p => {
            let tagsHtml = '';
            if (p.Tags) {
                tagsHtml = String(p.Tags).split(',').map(t => `<span class="tech-tag">${t.trim()}</span>`).join('');
            }
            contenedor.innerHTML += `
                <article class="bg-[#111] rounded-[24px] overflow-hidden border border-white/5 hover:border-cyan-500/40 transition-all group">
                    <div class="relative h-48 overflow-hidden">
                        <img src="${p.Imagen || ''}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                        <div class="absolute top-3 left-3 flex gap-1 flex-wrap">${tagsHtml}</div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-lg font-bold text-white mb-2 uppercase tracking-tight">${p.Titulo || ''}</h3>
                        <p class="text-gray-400 text-sm mb-4 line-clamp-2">${p.Descripción || ''}</p>
                        <a href="${p.Link || '#'}" target="_blank" class="text-cyan-400 text-xs font-black uppercase tracking-widest hover:text-white transition-colors">Ver Proyecto →</a>
                    </div>
                </article>`;
        });
    } catch (e) { console.error(e); }
}

// 2. MAGIA DEL VIDEO: APROVECHAMIENTO TOTAL DEL RECORRIDO
const video = document.getElementById('v0');
const heroSection = document.getElementById('home');
const heroText = document.getElementById('hero-text');

let targetTime = 0;
let actualTime = 0;

function updateVideoSmooth() {
    if (video.duration) {
        const rect = heroSection.getBoundingClientRect();
        
        // 'progress' va de 0 a 1 durante TODO el recorrido de los 400vh
        // Calculamos cuánto ha subido el borde superior respecto al alto total
        let progress = -rect.top / (rect.height - window.innerHeight);
        progress = Math.max(0, Math.min(progress, 1));
        
        // Mapeamos el progreso al tiempo total del video (8s)
        targetTime = video.duration * progress;
        
        // Suavizado mejorado para evitar saltos
        actualTime += (targetTime - actualTime) * 0.15; 
        video.currentTime = actualTime;

        // EFECTO TEXTO: Ahora el texto aguanta un poco más y se mueve
        // Se desvanece totalmente al llegar al 80% del scroll
        const textOpacity = 1 - (progress * 1.5); 
        heroText.style.opacity = Math.max(0, textOpacity);
        
        // Desplazamiento sutil hacia arriba (Parallax)
        const textMove = progress * 100;
        heroText.style.transform = `translateY(-${textMove}px)`;
    }
    requestAnimationFrame(updateVideoSmooth);
}

// Asegurarse de que el video esté listo
video.addEventListener('loadedmetadata', () => {
    requestAnimationFrame(updateVideoSmooth);
});

cargarProyectos();
</script>

</body>
</html>
